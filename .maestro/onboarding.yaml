# yamllint disable rule:document-start
appId: io.homeassistant.companion.android.debug
---
- launchApp:
    clearState: true

- assertVisible:
    text: '(?s)Connect to my Home.*Assistant server'
- tapOn:
    text: '(?s)Connect to my Home.*Assistant server'
    retryTapIfNoChange: true

- assertVisible: "Enter address manually"
- tapOn:
    text: "Enter address manually"
    retryTapIfNoChange: true

- assertVisible:
    text: '(?s)What is your Home.*Assistant address.*'
- tapOn: "http://homeassistant.local:8123"
- inputText: ${HOME_ASSISTANT_URL}
- tapOn:
    text: "Connect"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible: "Log in"
    timeout: 25000

- tapOn: "Username"
- inputText: ${HOME_ASSISTANT_USERNAME}
- tapOn: "Password"
- inputText: ${HOME_ASSISTANT_PASSWORD}
- hideKeyboard
- takeScreenshot: before_login_submit
- tapOn:
    text: "Log in"
    retryTapIfNoChange: true
- tapOn:
    text: "Authorize"
    optional: true

- extendedWaitUntil:
    visible: "How would you like to name this device?"
    timeout: 25000

- tapOn:
    text: "Save"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible: "Got it"
    timeout: 20000

- tapOn:
    text: "Got it"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible: "Use this device's location for automations"
    timeout: 15000

- tapOn:
    text: "Do not share my location"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible: "Let us help secure your remote connection"
    timeout: 15000

- tapOn:
    text: "Less secure: Do not allow this app to know when you're home"
    retryTapIfNoChange: true
- tapOn:
    text: "Next"
    retryTapIfNoChange: true
- extendedWaitUntil:
    notVisible: "Let us help secure your remote connection"
    timeout: 10000
- takeScreenshot: onboarding_complete

- extendedWaitUntil:
    visible:
      text: '(?i)^(Overview|More details)$'
    timeout: 25000

- tapOn:
    text: '(?i)^More details$'
    optional: true
    retryTapIfNoChange: true
- takeScreenshot: frontend_loaded_or_error_details
- extendedWaitUntil:
    visible:
      text: '(?i)^Overview$'
    timeout: 3000

- tapOn:
    text: '(?i)^Sidebar toggle$'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 2500

- extendedWaitUntil:
    visible:
      text: '(?i)^Settings$'
    timeout: 10000
- tapOn:
    text: '(?i)^Settings$'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: settings_navigation_start

- extendedWaitUntil:
    visible:
      text: '(?is).*Companion app.*'
    timeout: 10000
- takeScreenshot: settings_screen
- tapOn:
    text: '(?is).*Companion app.*'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: companion_app_screen
